name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache buildozer SDK/NDK/packages (not per-arch build dirs)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer/android/platform/android-sdk
            .buildozer/android/platform/android-ndk-r25b
            .buildozer/android/packages
            ~/-buildozer
          key: buildozer-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v3-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake \
            libffi-dev libssl-dev \
            python3-pip python3-setuptools \
            python3-wheel python3-venv

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.36
          pip install buildozer

      - name: Build APK
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          PIP_USE_DEPRECATED: legacy-resolver
          PIP_NO_CACHE_DIR: "1"
        run: |
          buildozer -v android debug

      - uses: actions/upload-artifact@v4
        with:
          name: Summit-WebViewer
          path: bin/*.apk
